<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gullak — नए ज़माने की पुरानी आदत</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Tiro+Devanagari+Hindi&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; }

    @keyframes dropIn {
      0% { transform: translateY(-80px) scale(0.6); opacity: 0; }
      60% { transform: translateY(8px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes flowPulse {
      0%, 100% { opacity: 0.4; transform: translateX(0); }
      50% { opacity: 1; transform: translateX(4px); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* scrollbar */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/ios-frame.jsx"></script>
  <script type="text/babel" src="components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/screens-landing.jsx"></script>
  <script type="text/babel" src="components/screens-onboarding.jsx"></script>
  <script type="text/babel" src="components/screens-commitment.jsx"></script>
  <script type="text/babel" src="components/screens-dashboard.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#E8650A",
      "bgColor": "#242424",
      "startScreen": "splash"
    }/*EDITMODE-END*/;

    const SCREENS = ['splash','language','phone','profile','trust','goals','autopilot','commitment','mandate','success','dashboard'];

    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen] = React.useState('splash');
      const [userData, setUserData] = React.useState({ name: '', phone: '', salaryDay: 1, goal: null, mode: null, amount: 20 });

      const go = (s) => setScreen(s);

      const screenLabel = {
        splash: 'Splash', language: 'Language', phone: 'Phone + OTP',
        profile: 'Profile', trust: 'Trust ⭐', goals: 'Goal Pick',
        autopilot: 'Autopilot', commitment: 'Commitment', mandate: 'Mandate',
        success: 'Success', dashboard: 'Dashboard'
      };

      const renderScreen = () => {
        const anim = { animation: 'fadeIn 0.35s ease-out', width: '100%', height: '100%' };
        switch (screen) {
          case 'splash':
            return <div style={anim}><SplashScreen onNext={() => go('language')} /></div>;
          case 'language':
            return <div style={anim}><LanguageScreen onSelect={(lang) => go('phone')} /></div>;
          case 'phone':
            return <div style={anim}><PhoneOTPScreen onComplete={(ph) => { setUserData(d => ({...d, phone: ph})); go('profile'); }} /></div>;
          case 'profile':
            return <div style={anim}><ProfileScreen onComplete={(name, sd) => { setUserData(d => ({...d, name, salaryDay: sd})); go('trust'); }} /></div>;
          case 'trust':
            return <div style={anim}><TrustScreen userName={userData.name || 'Dost'} onNext={() => go('goals')} /></div>;
          case 'goals':
            return <div style={anim}><GoalScreen onSelect={(g) => { setUserData(d => ({...d, goal: g})); go('autopilot'); }} /></div>;
          case 'autopilot':
            return <div style={anim}><AutopilotScreen goal={userData.goal || {label:'Saving'}} onSelect={(m) => { setUserData(d => ({...d, mode: m})); go('commitment'); }} /></div>;
          case 'commitment':
            return <div style={anim}><CommitmentScreen goal={userData.goal || {label:'Saving'}} mode={userData.mode} onSelect={(a) => { setUserData(d => ({...d, amount: a})); go('mandate'); }} /></div>;
          case 'mandate':
            return <div style={anim}><MandateScreen amount={userData.amount} onConfirm={() => go('success')} /></div>;
          case 'success':
            return <div style={anim}><SuccessScreen userName={userData.name || 'Dost'} amount={userData.amount} onGoHome={() => go('dashboard')} /></div>;
          case 'dashboard':
            return <div style={anim}><DashboardScreen userName={userData.name || 'Dost'} amount={userData.amount} goal={userData.goal} /></div>;
          default:
            return null;
        }
      };

      // Screen jump nav
      const navStyles = {
        wrap: { position:'fixed', bottom:20, left:'50%', transform:'translateX(-50%)', zIndex:1000, display:'flex', gap:4, background:'rgba(0,0,0,0.85)', borderRadius:20, padding:'6px 10px', maxWidth:'90vw', overflowX:'auto' },
        dot: (active) => ({ width:10, height:10, borderRadius:'50%', background: active ? '#E8650A' : 'rgba(255,255,255,0.3)', cursor:'pointer', flexShrink:0, transition:'all 0.2s', border: active ? '2px solid #D4A017' : '2px solid transparent' }),
        label: { position:'fixed', bottom:46, left:'50%', transform:'translateX(-50%)', background:'rgba(0,0,0,0.85)', color:'#FFF8F0', fontSize:11, fontWeight:700, padding:'4px 12px', borderRadius:10, zIndex:1000, whiteSpace:'nowrap' },
      };

      return (
        <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
          <IOSDevice screenWidth={375} screenHeight={812} statusBarVariant="dark">
            {renderScreen()}
          </IOSDevice>

          {/* Screen label */}
          <div style={navStyles.label}>{screenLabel[screen]}</div>

          {/* Dot navigation */}
          <div style={navStyles.wrap}>
            {SCREENS.map((s, i) => (
              <div key={s} style={navStyles.dot(screen === s)} onClick={() => go(s)} title={screenLabel[s]}></div>
            ))}
          </div>

          <TweaksPanel title="Gullak Tweaks">
            <TweakSection title="Jump to Screen">
              <TweakSelect label="Screen" value={screen}
                options={SCREENS.map(s => ({ value: s, label: screenLabel[s] }))}
                onChange={v => go(v)} />
            </TweakSection>
            <TweakSection title="Theme">
              <TweakColor label="Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
              <TweakColor label="Background" value={tweaks.bgColor} onChange={v => setTweak('bgColor', v)} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
